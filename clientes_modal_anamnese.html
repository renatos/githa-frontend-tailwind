<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anamnese Facial - Modal Light Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#3e3ef4",
          "background-light": "#f5f5f8",
          "background-dark": "#101022",
          "surface-light": "#ffffff",
          "border-light": "#e2e2ea",
          "text-main": "#1a1a2e",
          "text-muted": "#6b6b80",
        },
        fontFamily: {
          "display": ["Inter", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body {
    font-family: 'Inter', sans-serif;
  }
  .toggle-checkbox:checked {
    right: 0;
    border-color: #3e3ef4;
  }
  .toggle-checkbox:checked + .toggle-label {
    background-color: #3e3ef4;
  }
  .toggle-checkbox {
    right: 0;
    z-index: 1;
    border-color: #e2e2ea;
    transition: all 0.3s;
  }
  .toggle-label {
    width: 3rem;
    height: 1.5rem;
    background-color: #e2e2ea;
    border-radius: 9999px;
    transition: all 0.3s;
  }
</style>
</head>
<body class="bg-slate-900/50 min-h-screen flex items-center justify-center p-4 font-display">
<!-- Modal Container -->
<div class="bg-surface-light w-full max-w-3xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
<!-- Header -->
<div class="px-6 py-4 border-b border-border-light flex justify-between items-center sticky top-0 bg-surface-light z-10">
<h2 class="text-text-main text-xl font-bold tracking-tight">Ficha de Anamnese - Facial</h2>
<button class="text-text-muted hover:text-text-main transition-colors p-1 rounded-full hover:bg-background-light">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Scrollable Area -->
<div class="overflow-y-auto flex-1 p-6 space-y-8 bg-background-light">
<!-- Section: Dados da Cliente -->
<section class="bg-surface-light rounded-xl p-5 shadow-sm border border-border-light/50">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">person</span>
<h3 class="text-text-main text-lg font-bold">Dados da Cliente</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col col-span-1 md:col-span-2">
<span class="text-text-main text-sm font-medium mb-1.5">Queixa Principal</span>
<textarea class="form-input w-full resize-none rounded-lg text-text-main focus:ring-2 focus:ring-primary/20 border-border-light bg-surface-light focus:border-primary min-h-[100px] placeholder:text-text-muted p-3 text-sm transition-shadow" placeholder="Descreva a queixa principal e histórico recente..."></textarea>
</label>
<label class="flex flex-col">
<span class="text-text-main text-sm font-medium mb-1.5">Profissão</span>
<input class="form-input w-full rounded-lg text-text-main focus:ring-2 focus:ring-primary/20 border-border-light bg-surface-light focus:border-primary h-11 placeholder:text-text-muted px-3 text-sm transition-shadow" placeholder="Ex: Advogada, Estudante" type="text"/>
</label>
<label class="flex flex-col">
<span class="text-text-main text-sm font-medium mb-1.5">Data de Nascimento</span>
<input class="form-input w-full rounded-lg text-text-main focus:ring-2 focus:ring-primary/20 border-border-light bg-surface-light focus:border-primary h-11 px-3 text-sm transition-shadow" type="date"/>
</label>
</div>
</section>
<!-- Section: Rotina de Cuidados -->
<section class="bg-surface-light rounded-xl p-5 shadow-sm border border-border-light/50">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">spa</span>
<h3 class="text-text-main text-lg font-bold">Rotina de Cuidados</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Sunscreen Toggle -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between p-3 rounded-lg border border-border-light bg-background-light/50">
<span class="text-text-main text-sm font-medium">Usa protetor solar diariamente?</span>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" id="sunscreen-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-border-light cursor-pointer" for="sunscreen-toggle"></label>
</div>
</div>
</div>
<!-- Cosmetics Toggle & Sub-input -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between p-3 rounded-lg border border-border-light bg-background-light/50">
<span class="text-text-main text-sm font-medium">Usa cosméticos específicos?</span>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-primary" id="cosmetics-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-primary cursor-pointer" for="cosmetics-toggle"></label>
</div>
</div>
<!-- Sub-input (visible because toggle is ON) -->
<div class="mt-2 animate-fade-in">
<label class="flex flex-col">
<span class="text-text-muted text-xs font-medium mb-1">Quais produtos?</span>
<input class="form-input w-full rounded-lg text-text-main focus:ring-2 focus:ring-primary/20 border-primary bg-primary/5 focus:border-primary h-10 placeholder:text-text-muted/70 px-3 text-sm transition-shadow" placeholder="Ácido hialurônico, Vitamina C..." type="text"/>
</label>
</div>
</div>
</div>
</section>
<!-- Section: Avaliação Profissional -->
<section class="bg-surface-light rounded-xl p-5 shadow-sm border border-border-light/50">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">visibility</span>
<h3 class="text-text-main text-lg font-bold">Avaliação Profissional</h3>
</div>
<div class="mb-4">
<span class="text-text-main text-sm font-medium block mb-2">Biótipo Cutâneo (Selecione um ou mais)</span>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full text-sm font-medium border border-border-light bg-surface-light text-text-muted hover:bg-background-light transition-colors">Eudérmica (Normal)</button>
<button class="px-4 py-2 rounded-full text-sm font-medium border border-primary bg-primary/10 text-primary transition-colors">Oleosa</button>
<button class="px-4 py-2 rounded-full text-sm font-medium border border-border-light bg-surface-light text-text-muted hover:bg-background-light transition-colors">Alípica (Seca)</button>
<button class="px-4 py-2 rounded-full text-sm font-medium border border-border-light bg-surface-light text-text-muted hover:bg-background-light transition-colors">Mista</button>
<button class="px-4 py-2 rounded-full text-sm font-medium border border-primary bg-primary/10 text-primary transition-colors">Sensível</button>
</div>
</div>
<div class="grid grid-cols-1 gap-4">
<label class="flex flex-col">
<span class="text-text-main text-sm font-medium mb-1.5">Observações Adicionais (Fototipo, Lesões, etc)</span>
<textarea class="form-input w-full resize-none rounded-lg text-text-main focus:ring-2 focus:ring-primary/20 border-border-light bg-surface-light focus:border-primary min-h-[80px] placeholder:text-text-muted p-3 text-sm transition-shadow" placeholder="Anotações do avaliador..."></textarea>
</label>
</div>
</section>
<!-- Section: Consentimento -->
<section class="bg-surface-light rounded-xl p-5 shadow-sm border border-border-light/50">
<div class="flex items-start gap-3">
<div class="pt-0.5">
<input class="form-checkbox h-5 w-5 text-primary rounded border-border-light focus:ring-primary focus:ring-2 focus:ring-offset-2 transition-colors cursor-pointer" id="consent" type="checkbox"/>
</div>
<label class="text-sm text-text-muted leading-relaxed cursor-pointer" for="consent">
          Confirmo que as informações acima são verdadeiras e estou ciente de que a omissão de dados pode interferir no resultado do tratamento. Autorizo o uso das imagens para acompanhamento clínico.
        </label>
</div>
</section>
</div>
<!-- Footer Actions -->
<div class="px-6 py-4 border-t border-border-light bg-surface-light flex justify-end gap-3 rounded-b-xl sticky bottom-0">
<button class="px-5 py-2.5 rounded-lg text-text-main text-sm font-medium border border-border-light bg-surface-light hover:bg-background-light transition-colors">
      Cancelar
    </button>
<button class="px-5 py-2.5 rounded-lg text-white text-sm font-medium bg-primary hover:bg-primary/90 shadow-sm transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">save</span>
      Salvar Ficha
    </button>
</div>
</div>
</body></html>
